<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Customers — InsureTrack</title>
    <meta name="description" content="Register and manage insurance customers." />
    <link rel="stylesheet" href="css/style.css" />
</head>

<body>

    <header class="page-header">
        <div class="container">
            <nav>
                <a href="index.html" class="nav-brand"><span class="icon">🛡️</span> InsureTrack</a>
                <div class="nav-links">
                    <a href="index.html">Home</a>
                    <a href="customers.html" class="active">Customers</a>
                    <a href="policies.html">Policies</a>
                    <a href="payments.html">Payments</a>
                    <a href="dashboard.html">Dashboard</a>
                </div>
            </nav>
        </div>
    </header>

    <main class="main-content">
        <div class="container">

            <!-- Page title -->
            <div class="flex items-center justify-between flex-wrap gap-2 mb-3">
                <h1 class="page-title">👤 Customers</h1>
                <button class="btn btn-primary" id="btn-toggle-form">➕ Register Customer</button>
            </div>

            <!-- Registration Form (hidden by default) -->
            <div class="card mb-3" id="form-card" style="display:none;">
                <h2 class="section-heading">Customer Registration</h2>
                <form id="customer-form" novalidate>
                    <div class="form-grid">
                        <div class="form-group">
                            <label for="cust-name">Full Name *</label>
                            <input type="text" id="cust-name" placeholder="e.g. Arjun Sharma" />
                            <span class="field-error" id="err-name"></span>
                        </div>
                        <div class="form-group">
                            <label for="cust-age">Age *</label>
                            <input type="number" id="cust-age" placeholder="18 – 100" min="18" max="100" />
                            <span class="field-error" id="err-age"></span>
                        </div>
                        <div class="form-group">
                            <label for="cust-phone">Phone Number *</label>
                            <input type="tel" id="cust-phone" placeholder="10-digit mobile number" maxlength="15" />
                            <span class="field-error" id="err-phone"></span>
                        </div>
                        <div class="form-group" style="grid-column: 1 / -1;">
                            <label for="cust-address">Address *</label>
                            <textarea id="cust-address" placeholder="Full address…"></textarea>
                            <span class="field-error" id="err-address"></span>
                        </div>
                    </div>
                    <div style="margin-top:1.25rem; display:flex; gap:.75rem; flex-wrap:wrap;">
                        <button type="submit" class="btn btn-success" id="submit-btn">💾 Save Customer</button>
                        <button type="button" class="btn btn-outline" id="cancel-btn">Cancel</button>
                    </div>
                </form>
            </div>

            <!-- Search -->
            <div class="filter-bar">
                <input type="text" id="search-input" placeholder="🔍  Search by name or phone…" />
                <button class="btn btn-outline" id="btn-search">Search</button>
            </div>

            <!-- Table -->
            <div class="card" style="padding:0;">
                <div id="loading" class="spinner"></div>
                <div class="table-wrapper" id="table-wrap" style="display:none;">
                    <table id="customer-table">
                        <thead>
                            <tr>
                                <th>#ID</th>
                                <th>Name</th>
                                <th>Age</th>
                                <th>Phone</th>
                                <th>Address</th>
                                <th>Policies</th>
                                <th>Total Premium</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="customer-tbody"></tbody>
                    </table>
                </div>
                <div class="empty-state" id="empty-state" style="display:none;">
                    <div class="empty-icon">👤</div>
                    <p>No customers found. Register the first one!</p>
                </div>
            </div>

        </div>
    </main>

    <div id="toast-container"></div>
    <script src="js/api.js"></script>
    <script>
        const form = document.getElementById('customer-form');
        const formCard = document.getElementById('form-card');
        const tbody = document.getElementById('customer-tbody');
        const loading = document.getElementById('loading');
        const tableWrap = document.getElementById('table-wrap');
        const emptyEl = document.getElementById('empty-state');
        let editId = null;

        // Toggle form visibility
        document.getElementById('btn-toggle-form').addEventListener('click', () => {
            formCard.style.display = formCard.style.display === 'none' ? 'block' : 'none';
            if (formCard.style.display === 'none') resetForm();
        });
        document.getElementById('cancel-btn').addEventListener('click', () => {
            formCard.style.display = 'none';
            resetForm();
        });

        // --- Validation ---
        function validate() {
            let ok = true;
            const clear = (id) => { document.getElementById(id).textContent = ''; document.getElementById(id.replace('err-', 'cust-')).classList.remove('error'); };
            const error = (inputId, errId, msg) => {
                document.getElementById(inputId).classList.add('error');
                document.getElementById(errId).textContent = msg;
                ok = false;
            };
            ['err-name', 'err-age', 'err-phone', 'err-address'].forEach(e => clear(e));

            const name = document.getElementById('cust-name').value.trim();
            const age = parseInt(document.getElementById('cust-age').value);
            const phone = document.getElementById('cust-phone').value.trim();
            const addr = document.getElementById('cust-address').value.trim();

            if (!name) error('cust-name', 'err-name', 'Full name is required');
            if (isNaN(age) || age < 18 || age > 100) error('cust-age', 'err-age', 'Age must be between 18 and 100');
            if (!/^\d{10,15}$/.test(phone)) error('cust-phone', 'err-phone', 'Enter a valid 10–15 digit phone number');
            if (!addr) error('cust-address', 'err-address', 'Address is required');

            return ok;
        }

        // --- Submit ---
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!validate()) return;

            const payload = {
                customer_name: document.getElementById('cust-name').value.trim(),
                age: document.getElementById('cust-age').value,
                phone_number: document.getElementById('cust-phone').value.trim(),
                address: document.getElementById('cust-address').value.trim(),
            };

            const submitBtn = document.getElementById('submit-btn');
            submitBtn.disabled = true;

            try {
                if (editId) {
                    await api.put(`/customers/${editId}`, payload);
                    showToast('Customer updated successfully', 'success');
                } else {
                    await api.post('/customers', payload);
                    showToast('Customer registered successfully', 'success');
                }
                resetForm();
                formCard.style.display = 'none';
                loadCustomers();
            } catch (err) {
                showToast(err.message, 'error');
            } finally {
                submitBtn.disabled = false;
            }
        });

        function resetForm() {
            form.reset();
            editId = null;
            document.getElementById('submit-btn').textContent = '💾 Save Customer';
            ['err-name', 'err-age', 'err-phone', 'err-address'].forEach(id => {
                const el = document.getElementById(id);
                if (el) el.textContent = '';
            });
            ['cust-name', 'cust-age', 'cust-phone', 'cust-address'].forEach(id => {
                const el = document.getElementById(id);
                if (el) el.classList.remove('error');
            });
        }

        // --- Load table ---
        async function loadCustomers(search = '') {
            loading.style.display = 'block';
            tableWrap.style.display = 'none';
            emptyEl.style.display = 'none';

            try {
                const { data } = await api.get(`/customers?search=${encodeURIComponent(search)}`);
                loading.style.display = 'none';

                if (!data.length) { emptyEl.style.display = 'block'; return; }
                tableWrap.style.display = 'block';

                tbody.innerHTML = data.map(c => `
        <tr>
          <td><span style="color:var(--primary-light);font-weight:600;">C${c.customer_id}</span></td>
          <td><strong>${c.customer_name}</strong></td>
          <td>${c.age}</td>
          <td>${c.phone_number}</td>
          <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${c.address}">${c.address}</td>
          <td><span style="color:var(--accent);">${c.total_policies}</span></td>
          <td>${fmt.currency(c.total_premium)}</td>
          <td>
            <div class="flex gap-2">
              <button class="btn btn-outline btn-sm" onclick="editCustomer(${c.customer_id})">✏️</button>
              <a href="policies.html?customer_id=${c.customer_id}" class="btn btn-outline btn-sm">📋</a>
              <button class="btn btn-danger btn-sm" onclick="deleteCustomer(${c.customer_id})">🗑️</button>
            </div>
          </td>
        </tr>
      `).join('');
            } catch (err) {
                loading.style.display = 'none';
                showToast('Failed to load customers', 'error');
            }
        }

        async function editCustomer(id) {
            try {
                const { data } = await api.get(`/customers/${id}`);
                document.getElementById('cust-name').value = data.customer_name;
                document.getElementById('cust-age').value = data.age;
                document.getElementById('cust-phone').value = data.phone_number;
                document.getElementById('cust-address').value = data.address;
                editId = id;
                document.getElementById('submit-btn').textContent = '💾 Update Customer';
                formCard.style.display = 'block';
                formCard.scrollIntoView({ behavior: 'smooth' });
            } catch (err) { showToast('Failed to load customer', 'error'); }
        }

        async function deleteCustomer(id) {
            if (!confirm('Delete this customer and all their policies?')) return;
            try {
                await api.delete(`/customers/${id}`);
                showToast('Customer deleted', 'success');
                loadCustomers();
            } catch (err) { showToast(err.message, 'error'); }
        }

        // Search
        document.getElementById('btn-search').addEventListener('click', () => {
            loadCustomers(document.getElementById('search-input').value.trim());
        });
        document.getElementById('search-input').addEventListener('keydown', e => {
            if (e.key === 'Enter') document.getElementById('btn-search').click();
        });

        // Initial load
        loadCustomers();
    </script>
</body>

</html>
